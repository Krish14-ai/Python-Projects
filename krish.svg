<svg width="900" height="300" viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="skyGrad" cx="62%" cy="48%" r="70%">
      <stop offset="0%" stop-color="#cc44ff"/>
      <stop offset="35%" stop-color="#8800bb"/>
      <stop offset="70%" stop-color="#440066"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </radialGradient>
    <radialGradient id="moonCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#ffccff"/>
      <stop offset="70%" stop-color="#ee88ff"/>
      <stop offset="100%" stop-color="#bb44dd"/>
    </radialGradient>
    <radialGradient id="moonHalo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dd55ff" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#9900cc" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0a0010" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="reflection" cx="50%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#cc44ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0a0010" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#661199"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0030"/>
      <stop offset="100%" stop-color="#0a0010"/>
    </linearGradient>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
    <filter id="tinyBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="sceneClip">
      <rect width="900" height="300"/>
    </clipPath>
    <clipPath id="gridClip">
      <rect x="0" y="195" width="900" height="105"/>
    </clipPath>
    <clipPath id="oceanClip">
      <rect x="0" y="195" width="900" height="105"/>
    </clipPath>
  </defs>

  <g clip-path="url(#sceneClip)">

    <!-- Sky -->
    <rect width="900" height="300" fill="url(#skyGrad)"/>

    <!-- Stars -->
    <circle cx="80" cy="25" r="1.2" fill="#ffccff" opacity="0.9">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="160" cy="45" r="0.9" fill="#ffaaff" opacity="0.7">
      <animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="250" cy="18" r="1.1" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="310" cy="55" r="0.8" fill="#ffccff" opacity="0.6">
      <animate attributeName="opacity" values="0.1;0.8;0.1" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="390" cy="30" r="1" fill="#ffaaff" opacity="0.75">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="680" cy="28" r="1.2" fill="#ffccff" opacity="0.85">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="50" r="0.9" fill="#ffaaff" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="22" r="1" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="860" cy="60" r="0.8" fill="#ffccff" opacity="0.65">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- Moon outer halo -->
    <ellipse cx="580" cy="138" rx="130" ry="130" fill="url(#moonHalo)" filter="url(#softBlur)">
      <animate attributeName="rx" values="120;138;120" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="120;138;120" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;1;0.7" dur="4s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Moon mid glow -->
    <circle cx="580" cy="138" r="84" fill="#cc44ff" opacity="0.25" filter="url(#softBlur)">
      <animate attributeName="r" values="80;92;80" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.35;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Moon body -->
    <circle cx="580" cy="138" r="72" fill="url(#moonCore)">
      <animate attributeName="r" values="70;75;70" dur="4s" repeatCount="indefinite"/>
    </circle>

    <!-- Moon surface lines (horizontal cuts) -->
    <line x1="510" y1="130" x2="650" y2="130" stroke="#cc44ff" stroke-width="1.2" opacity="0.35"/>
    <line x1="510" y1="145" x2="650" y2="145" stroke="#cc44ff" stroke-width="1.2" opacity="0.35"/>
    <line x1="515" y1="116" x2="645" y2="116" stroke="#cc44ff" stroke-width="0.9" opacity="0.25"/>
    <line x1="515" y1="159" x2="645" y2="159" stroke="#cc44ff" stroke-width="0.9" opacity="0.25"/>

    <!-- Horizon water base -->
    <rect x="0" y="195" width="900" height="105" fill="url(#oceanGrad)"/>

    <!-- Horizon glow line -->
    <rect x="0" y="193" width="900" height="3" fill="#ee88ff" opacity="0.7"/>
    <rect x="0" y="194" width="900" height="1" fill="#ffffff" opacity="0.4"/>

    <!-- Moon reflection on water -->
    <ellipse cx="580" cy="195" rx="68" ry="10" fill="#dd55ff" opacity="0.3" filter="url(#tinyBlur)"/>
    <rect x="548" y="195" width="64" height="105" fill="url(#reflection)"/>

    <!-- Animated water shimmer lines -->
    <g clip-path="url(#oceanClip)">
      <line x1="460" y1="210" x2="700" y2="210" stroke="#dd55ff" stroke-width="1" opacity="0.3">
        <animate attributeName="opacity" values="0.1;0.4;0.1" dur="2s" repeatCount="indefinite"/>
      </line>
      <line x1="490" y1="222" x2="670" y2="222" stroke="#dd55ff" stroke-width="0.8" opacity="0.25">
        <animate attributeName="opacity" values="0.15;0.35;0.15" dur="2.5s" repeatCount="indefinite"/>
      </line>
      <line x1="510" y1="236" x2="650" y2="236" stroke="#cc44ff" stroke-width="0.7" opacity="0.2">
        <animate attributeName="opacity" values="0.1;0.3;0.1" dur="1.8s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Synthwave floor grid -->
    <g clip-path="url(#gridClip)">
      <!-- Horizontal moving grid lines -->
      <g>
        <animate attributeName="transform" attributeType="XML" type="translate" values="0,0;0,28;0,0" dur="2s" repeatCount="indefinite"/>
        <line x1="0" y1="198" x2="900" y2="198" stroke="#cc44ff" stroke-width="0.7" opacity="0.55"/>
        <line x1="0" y1="212" x2="900" y2="212" stroke="#cc44ff" stroke-width="0.7" opacity="0.5"/>
        <line x1="0" y1="226" x2="900" y2="226" stroke="#cc44ff" stroke-width="0.7" opacity="0.45"/>
        <line x1="0" y1="240" x2="900" y2="240" stroke="#cc44ff" stroke-width="0.7" opacity="0.4"/>
        <line x1="0" y1="254" x2="900" y2="254" stroke="#cc44ff" stroke-width="0.6" opacity="0.35"/>
        <line x1="0" y1="268" x2="900" y2="268" stroke="#cc44ff" stroke-width="0.6" opacity="0.3"/>
        <line x1="0" y1="282" x2="900" y2="282" stroke="#cc44ff" stroke-width="0.5" opacity="0.25"/>
        <line x1="0" y1="296" x2="900" y2="296" stroke="#cc44ff" stroke-width="0.5" opacity="0.2"/>
      </g>
      <!-- Vertical perspective lines -->
      <line x1="450" y1="195" x2="0" y2="300" stroke="#cc44ff" stroke-width="0.7" opacity="0.45"/>
      <line x1="450" y1="195" x2="120" y2="300" stroke="#cc44ff" stroke-width="0.7" opacity="0.4"/>
      <line x1="450" y1="195" x2="240" y2="300" stroke="#cc44ff" stroke-width="0.6" opacity="0.38"/>
      <line x1="450" y1="195" x2="340" y2="300" stroke="#cc44ff" stroke-width="0.6" opacity="0.35"/>
      <line x1="450" y1="195" x2="420" y2="300" stroke="#cc44ff" stroke-width="0.5" opacity="0.32"/>
      <line x1="450" y1="195" x2="480" y2="300" stroke="#cc44ff" stroke-width="0.5" opacity="0.32"/>
      <line x1="450" y1="195" x2="560" y2="300" stroke="#cc44ff" stroke-width="0.6" opacity="0.35"/>
      <line x1="450" y1="195" x2="660" y2="300" stroke="#cc44ff" stroke-width="0.6" opacity="0.38"/>
      <line x1="450" y1="195" x2="760" y2="300" stroke="#cc44ff" stroke-width="0.7" opacity="0.4"/>
      <line x1="450" y1="195" x2="900" y2="300" stroke="#cc44ff" stroke-width="0.7" opacity="0.45"/>
    </g>

    <!-- Left silhouette structure -->
    <polygon points="0,300 0,200 40,180 80,155 100,148 108,195 80,300" fill="#0a0010"/>
    <polygon points="85,148 108,110 125,195 100,300 80,300" fill="#080008"/>
    <ellipse cx="108" cy="118" r="7" fill="#110011"/>

    <!-- Right silhouette structures -->
    <polygon points="760,300 780,200 820,170 860,185 900,200 900,300" fill="#0a0010"/>
    <rect x="800" y="160" width="70" height="40" rx="2" fill="#080008"/>
    <rect x="810" y="155" width="50" height="8" rx="1" fill="#0a0010"/>

    <!-- Text: Name with glow -->
    <text x="60" y="95" font-family="'Arial Black', Arial, sans-serif" font-size="40" font-weight="900" fill="#ffffff" opacity="0" filter="url(#textGlow)">
      Hi, I'm Pallavi
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.4s" fill="freeze"/>
    </text>
    <text x="60" y="95" font-family="'Arial Black', Arial, sans-serif" font-size="40" font-weight="900" fill="none" stroke="#ee88ff" stroke-width="0.8" opacity="0">
      Hi, I'm Pallavi
      <animate attributeName="opacity" values="0;0.7" dur="1s" begin="0.4s" fill="freeze"/>
    </text>

    <!-- Subtitle -->
    <text x="62" y="125" font-family="Arial, sans-serif" font-size="15" fill="#ddaaff" letter-spacing="1.5" opacity="0">
      B.TECH CSE  ·  FULL STACK DEVELOPER  ·  CREATIVE SOUL
      <animate attributeName="opacity" values="0;0.9" dur="1s" begin="0.9s" fill="freeze"/>
    </text>

    <!-- Skill tags -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="1s" begin="1.4s" fill="freeze"/>
      <rect x="62" y="142" width="70" height="22" rx="11" fill="#440066" stroke="#cc44ff" stroke-width="0.8"/>
      <text x="97" y="157" font-family="Arial, sans-serif" font-size="11" fill="#ffccff" text-anchor="middle">Python</text>

      <rect x="140" y="142" width="86" height="22" rx="11" fill="#440066" stroke="#cc44ff" stroke-width="0.8"/>
      <text x="183" y="157" font-family="Arial, sans-serif" font-size="11" fill="#ffccff" text-anchor="middle">JavaScript</text>

      <rect x="234" y="142" width="54" height="22" rx="11" fill="#440066" stroke="#cc44ff" stroke-width="0.8"/>
      <text x="261" y="157" font-family="Arial, sans-serif" font-size="11" fill="#ffccff" text-anchor="middle">Java</text>

      <rect x="296" y="142" width="40" height="22" rx="11" fill="#440066" stroke="#cc44ff" stroke-width="0.8"/>
      <text x="316" y="157" font-family="Arial, sans-serif" font-size="11" fill="#ffccff" text-anchor="middle">SQL</text>

      <rect x="344" y="142" width="30" height="22" rx="11" fill="#440066" stroke="#cc44ff" stroke-width="0.8"/>
      <text x="359" y="157" font-family="Arial, sans-serif" font-size="11" fill="#ffccff" text-anchor="middle">C</text>
    </g>

    <!-- Motivation quote -->
    <text x="62" y="182" font-family="Georgia, serif" font-size="13" fill="#ee88ff" font-style="italic" opacity="0">
      "She believed she could, so she did."
      <animate attributeName="opacity" values="0;1" dur="1.2s" begin="2s" fill="freeze"/>
    </text>
    <line x1="62" y1="187" x2="348" y2="187" stroke="#cc44ff" stroke-width="0.6" opacity="0">
      <animate attributeName="opacity" values="0;0.5" dur="1.2s" begin="2.2s" fill="freeze"/>
    </line>

  </g>
</svg>
